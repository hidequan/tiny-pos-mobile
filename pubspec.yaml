name: tiny_pos_mobile
description: "Tiny POS - he thong ban hang chuoi ca phe"
publish_to: 'none'
version: 0.3.2+12

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  qr_flutter: ^4.1.0
  printing: ^5.14.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/fonts/

# App launcher icons (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#241008"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#E9E0D2"
    theme_color: "#C75B39"

# Native splash screen (run: dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#241008"
  image: "assets/icon/icon_foreground.png"
  android_12:
    image: "assets/icon/icon_foreground.png"
    color: "#241008"
  web: false
