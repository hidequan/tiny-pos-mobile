name: Android build (APK + AAB)

# Builds installable test artifacts on GitHub's Linux runners (no local toolchain
# needed, and none of the JDK17 loopback issue seen on the dev Windows box).
# Triggers on every push to main and can be run on-demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK (release, debug-signed)
        run: flutter build apk --release

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tiny-pos-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: tiny-pos-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Distributes the APK to testers via Firebase App Distribution, giving each
      # tester an email + install link. Skipped automatically until the two repo
      # secrets are set (Settings ▸ Secrets ▸ Actions, or `gh secret set`):
      #   FIREBASE_APP_ID          -> e.g. 1:1234567890:android:abcdef0123
      #   FIREBASE_SERVICE_ACCOUNT -> full JSON of a service account with the
      #                               "Firebase App Distribution Admin" role
      - name: Distribute to Firebase App Distribution
        if: ${{ env.FIREBASE_APP_ID != '' }}
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.0
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Tiny POS test build (auto from GitHub Actions)"
